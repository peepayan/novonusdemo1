<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novonus Demo</title>
  <script>
    if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      document.write('<base href="/demo/" />');
    }
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-meta">
      <span class="dot dot-live"></span> guided pipeline walkthrough
    </div>
  </header>

  <nav class="stage-nav" id="stage-nav"></nav>

  <main class="app-main" id="app-main">
    <!-- screens are rendered by app.js -->
  </main>

  <footer class="app-footer">
    <button id="prev-btn" class="nav-btn">← Prev</button>
    <span class="footer-hint">click any stage above, or use ← / → keys</span>
    <button id="next-btn" class="nav-btn">Next →</button>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>

</html>
